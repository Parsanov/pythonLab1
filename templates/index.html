{% extends 'base.html' %}
{% block body %}

<h1>Туристичні поїздки</h1>

<table>
  <tr>
    <th>Країна</th>
    <th>Туроператор</th>
    <th>Ціна</th>
    <th>Днів</th>
  </tr>
  {% for trip in trips %}
  <tr>
    <td>{{ trip.країна }}</td>
    <td>{{ trip.туроператор }}</td>
    <td>{{ trip.ціна }} USD</td>
    <td>{{ trip.кількість_днів }}</td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
